strategy: taker_taker
mode: paper

pair:
  base: WTI
  leg_a: { venue: lighter, symbol: WTI }
  leg_b: { venue: aster,   symbol: CLUSDT }

# sizing — qty=1 is the operational target; start smaller for first live runs
qty: 0.12
max_qty: 0.6

fees_bps: 1
min_profit_bps: 1.5
bias_halflife_s: 3600         # ~1h slow-center
scale_halflife_s: 300         # 5m dispersion diagnostic
warmup_seconds: 1800

# depth / staleness gates
max_levels: 3
max_stale_ms: 600

risk:
  max_consecutive_failures: 3
  max_leg_latency_ms: 500
  daily_loss_cap_usd: 10

optimisations:

  in_flight_cap_per_direction: 1
  persistence_confirm: { enabled: true, t_confirm_ms: 400, n_confirm: 6, drift_max_bps: 1.0 }
